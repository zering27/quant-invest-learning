# Render 部署配置文件
services:
  - type: web
    name: quant-invest-learning
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PORT
        fromService:
          type: web
          name: quant-invest-learning
          envVarKey: RENDER_PORT
